# pubspec.yaml
name: hrms_mobile
description: HRMS Mobile App for Employees

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.0.5

  # Networking
  dio: ^5.3.2

  # Storage
  shared_preferences: ^2.2.2

  # Location & Camera
  geolocator: ^10.1.0
  image_picker: ^1.0.4

  # Date & Time
  intl: ^0.18.1

  # Other
  pull_to_refresh: ^2.0.0
  shimmer: ^3.0.0

  lottie: ^2.7.0
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Hapus atau komentari bagian assets jika tidak ada folder assets/images
  # assets:
  #   - assets/images/
